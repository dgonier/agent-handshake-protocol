<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>{% block title %}AHP Debate Viewer{% endblock %}</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-card-hover: #1c232c;
      --fg: #e6edf3;
      --fg-dim: #9ba8b4;
      --accent: #58a6ff;
      --accent-warn: #f7b955;
      --accent-good: #3fb950;
      --accent-bad: #f85149;
      --border: #30363d;
      --code-bg: #1f2937;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    body { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }
    nav {
      position: sticky; top: 0; z-index: 10;
      background: rgba(13,17,23,0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      display: flex; gap: 14px; align-items: center;
    }
    nav a {
      color: var(--fg-dim); text-decoration: none; font-size: 14px; font-weight: 500;
    }
    nav a.active { color: var(--accent); }
    nav .brand { color: var(--fg); font-weight: 700; margin-right: auto; font-size: 15px; }
    main { padding: 16px; max-width: 720px; margin: 0 auto; }
    h1 { font-size: 22px; margin: 0 0 4px 0; }
    h2 { font-size: 16px; margin: 24px 0 8px 0; color: var(--fg-dim); font-weight: 600;
         text-transform: uppercase; letter-spacing: 0.05em; }
    .meta { color: var(--fg-dim); font-size: 13px; margin-bottom: 16px; }
    .card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; margin: 10px 0;
    }
    .card .slug { font-weight: 700; color: var(--accent); font-size: 14px; }
    .card .address { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
                     color: var(--fg-dim); font-size: 11px; margin-top: 2px;
                     word-break: break-all; }
    .card .body { margin-top: 10px; font-size: 15px; white-space: pre-wrap; }
    .card .persona { margin-top: 8px; padding: 8px 10px; border-left: 3px solid var(--accent);
                     background: rgba(88,166,255,0.06); font-size: 13px; color: var(--fg-dim); }
    form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 12px;
            color: var(--fg-dim); flex: 1 1 auto; min-width: 0; }
    input, button, select {
      font: inherit; padding: 10px 12px;
      background: var(--bg-card); color: var(--fg);
      border: 1px solid var(--border); border-radius: 8px;
      min-width: 0;
    }
    input:focus, select:focus { outline: 2px solid var(--accent); }
    button {
      background: var(--accent); color: #061018; font-weight: 600;
      border: none; cursor: pointer;
      padding: 10px 16px;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .pill {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .pill.ok  { background: rgba(63,185,80,0.18);  color: var(--accent-good); }
    .pill.bad { background: rgba(248,81,73,0.18);  color: var(--accent-bad); }
    .pill.dim { background: rgba(155,168,180,0.18); color: var(--fg-dim); }
    table { border-collapse: collapse; width: 100%; font-size: 13px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid var(--border);
             text-align: left; vertical-align: top; }
    th { color: var(--fg-dim); font-weight: 600; text-transform: uppercase;
         font-size: 11px; letter-spacing: 0.04em; }
    td.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
              font-size: 11px; word-break: break-all; }
    .empty { color: var(--fg-dim); font-style: italic; padding: 24px 0; text-align: center; }
    .footer { color: var(--fg-dim); font-size: 12px; padding: 24px 0; text-align: center; }
    .scroll-x { overflow-x: auto; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">AHP</span>
    <a href="/" class="{% if page == 'debate' %}active{% endif %}">Debate</a>
    <a href="/audit" class="{% if page == 'audit' %}active{% endif %}">Audit</a>
    <a href="/runs" class="{% if page == 'runs' %}active{% endif %}">Runs</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
    <div class="footer">AHP {{ version }} · {{ now }}</div>
  </main>
</body>
</html>
