[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ahp"
version = "0.1.0"
description = "Agentic Handshake Protocol — addressable, format-aware messaging between heterogeneous agents."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "AHP Contributors" }]
dependencies = []

[project.optional-dependencies]
test = ["pytest>=7", "hypothesis>=6"]

[tool.setuptools.packages.find]
include = ["ahp*"]
exclude = ["tests*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
